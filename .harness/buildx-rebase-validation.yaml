# =============================================================================
# Buildx rebase / vuln-fix validation pipeline
# =============================================================================
# Purpose: One pipeline covering Automation CI cases that exercise drone-buildx
#          (BuildAndPush* + DLC). Use this to validate harnesssecure/buildx
#          (or plugins/buildx) after buildkit rebase + BUILDX_URL bumps.
#
# Source inventory (Automation repo):
#   Explicit *buildx* YAMLs:
#     - vm/linux/ecrBuildPush/base-connector-success-buildx.yml   (CI-T7872)
#     - vm/linux/gcrBuildPush/base-connector-success-buildx.yml   (CI-T7874)
#     - vm/linux/ecrBuildPush/base-connector-failure-buildx.yml    (CI-T8917; same YAML as success — skip)
#   VM DLC (assert "docker buildx build", FULL_RUN → OPTIMIZED):
#     - vm/linux/dockerBuildPush/dlc-success.yml
#     - vm/linux/dockerBuildPush/dlc-success-ar.yml
#     - vm/linux/ecrBuildPush/dlc-success.yml
#     - vm/linux/gcrBuildPush/dlc-success.yml
#     - vm/linux/gcrBuildPush/gcr-oidc-dlc-success.yml            (CI-T7786)
#     - vm/linux/garBuildPush/dlc-success.yml                     (CI-T1949)
#     - vm/linux/dockerBuildPush/jfrog-build-push-dlc-withoutfqn-success.yml (CI-T5912)
#   K8 DLC backends (exporting cache / OPTIMIZED):
#     - k8/linux/dockerLayerCaching/dlc-success-aws-*.yml
#     - k8/linux/dockerLayerCaching/dlc-success-gcp-*.yml
#     - k8/linux/dockerLayerCaching/dlc-remote-cache-*.yml
#   K8 cache-enable (suite names *buildx*):
#     - k8/linux/steps/dockerBuildPush/docker-build-push-success-cache-enable.yml (CI-T8009)
#     - .../docker-build-push-success-cache-enable-ar.yml (CI-T20126)
#   Gaps in Automation (not present — added here as optional smoke):
#     - ACR DLC, bake, multi-arch platforms
#
# How to use:
#   1. Import / paste into a Harness project (CI).
#   2. Set pipeline variables / inputs: connectors, ECR account, repos.
#   3. To force YOUR plugin image on Plugin smoke stages, set
#        buildx_plugin_image = harnesssecure/buildx:1.3.24-test
#      Native BuildAndPush* steps use the account’s managed plugin image —
#      point the account/FF at the test tag, or rely on Plugin stages below.
#   4. Pass criteria (from Automation logAssertions):
#        cold:  docker buildx build | exporting cache to Harness | FULL_RUN
#        warm:  docker buildx build | CACHED | OPTIMIZED
# =============================================================================
pipeline:
  name: buildx-rebase-validation
  identifier: buildx_rebase_validation
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  tags:
    purpose: buildx-rebase-validation
  variables:
    - name: buildx_plugin_image
      type: String
      description: RF/plugin image under test (Plugin-step stages only)
      value: harnesssecure/buildx:1.3.24-test
    - name: docker_connector
      type: String
      description: Docker registry connector (Docker Hub / GAR docker)
      value: <+input>
    - name: base_image_connector
      type: String
      description: Base image connector (Docker Hub) for baseImageConnectorRefs cases
      value: <+input>
    - name: ecr_connector
      type: String
      value: <+input>
    - name: gcr_connector
      type: String
      value: <+input>
    - name: gar_connector
      type: String
      value: <+input>
    - name: acr_connector
      type: String
      description: Optional — leave unused if ACR not wired
      value: <+input>
    - name: ecr_account
      type: String
      value: <+input>
    - name: ecr_region
      type: String
      value: us-east-1
    - name: gcr_host
      type: String
      value: us.gcr.io
    - name: gcr_project
      type: String
      value: ci-play
    - name: gar_host
      type: String
      value: europe-west2-docker.pkg.dev
    - name: gar_project
      type: String
      value: ci-play
    - name: docker_repo
      type: String
      description: Docker/GAR docker repo prefix for DLC docker stages
      value: <+input>
    - name: run_id
      type: String
      value: <+pipeline.executionId.toLowerCase()>
  stages:
    # -------------------------------------------------------------------------
    # Stage group 0 — force plugin image smoke (bypasses managed BuildAndPush image)
    # Mirrors Automation "docker buildx build" path with explicit image.
    # -------------------------------------------------------------------------
    - stage:
        name: 00-plugin-image-smoke
        identifier: plugin_image_smoke
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Create simple Dockerfile
                  identifier: create_dockerfile
                  spec:
                    shell: Sh
                    command: |
                      cat > Dockerfile <<'EOF'
                      FROM alpine:3.20
                      RUN echo "buildx-rebase-smoke" > /smoke.txt
                      CMD cat /smoke.txt
                      EOF
                      cat Dockerfile
              - step:
                  type: Plugin
                  name: Build push with test buildx image
                  identifier: plugin_build_push
                  spec:
                    connectorRef: <+pipeline.variables.docker_connector>
                    image: <+pipeline.variables.buildx_plugin_image>
                    settings:
                      username: <+input>
                      password: <+input>
                      repo: <+pipeline.variables.docker_repo>
                      tags: smoke-<+pipeline.variables.run_id>
                      dockerfile: Dockerfile
                      context: .
                      purge: "false"
                # Expect in logs: Using BuildKit Version / docker buildx / buildkitd

    # -------------------------------------------------------------------------
    # Parallel registry DLC matrix (Automation Stage B)
    # Each registry: cold (FULL_RUN) then warm (OPTIMIZED) in-stage.
    # -------------------------------------------------------------------------
    - parallel:
        # --- Docker Registry DLC (dlc-success.yml / dlc-success-ar.yml) ---
        - stage:
            name: 10-docker-dlc
            identifier: docker_dlc
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create DLC Dockerfile
                      identifier: create_dlc_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > Dockerfile <<'EOF'
                          FROM alpine:3.20 AS base
                          RUN apk add --no-cache curl git
                          FROM base AS mid
                          RUN echo "layer-mid" > /mid.txt
                          FROM alpine:3.20 AS final
                          COPY --from=mid /mid.txt /mid.txt
                          RUN echo "layer-final" > /final.txt
                          EOF
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: Docker DLC cold
                      identifier: docker_dlc_cold
                      spec:
                        connectorRef: <+pipeline.variables.docker_connector>
                        repo: <+pipeline.variables.docker_repo>
                        tags:
                          - dlc-docker-<+pipeline.variables.run_id>
                        dockerfile: Dockerfile
                        context: .
                        caching: true
                      # Expect: docker buildx build | exporting cache to Harness | FULL_RUN
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: Docker DLC warm
                      identifier: docker_dlc_warm
                      spec:
                        connectorRef: <+pipeline.variables.docker_connector>
                        repo: <+pipeline.variables.docker_repo>
                        tags:
                          - dlc-docker-<+pipeline.variables.run_id>
                        dockerfile: Dockerfile
                        context: .
                        caching: true
                      # Expect: CACHED | OPTIMIZED

        # --- ECR DLC (ecrBuildPush/dlc-success.yml) ---
        - stage:
            name: 11-ecr-dlc
            identifier: ecr_dlc
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create DLC Dockerfile
                      identifier: create_dlc_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > Dockerfile <<'EOF'
                          FROM alpine:3.20 AS base
                          RUN apk add --no-cache curl
                          FROM base AS mid
                          RUN echo "ecr-mid" > /mid.txt
                          FROM alpine:3.20 AS final
                          COPY --from=mid /mid.txt /mid.txt
                          EOF
                  - step:
                      type: BuildAndPushECR
                      name: ECR DLC cold
                      identifier: ecr_dlc_cold
                      spec:
                        connectorRef: <+pipeline.variables.ecr_connector>
                        region: <+pipeline.variables.ecr_region>
                        account: <+pipeline.variables.ecr_account>
                        imageName: buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        caching: true
                  - step:
                      type: BuildAndPushECR
                      name: ECR DLC warm
                      identifier: ecr_dlc_warm
                      spec:
                        connectorRef: <+pipeline.variables.ecr_connector>
                        region: <+pipeline.variables.ecr_region>
                        account: <+pipeline.variables.ecr_account>
                        imageName: buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        caching: true

        # --- GCR DLC (gcrBuildPush/dlc-success.yml) ---
        - stage:
            name: 12-gcr-dlc
            identifier: gcr_dlc
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create DLC Dockerfile
                      identifier: create_dlc_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > Dockerfile <<'EOF'
                          FROM alpine:3.20 AS base
                          RUN apk add --no-cache curl
                          FROM base AS mid
                          RUN echo "gcr-mid" > /mid.txt
                          FROM alpine:3.20 AS final
                          COPY --from=mid /mid.txt /mid.txt
                          EOF
                  - step:
                      type: BuildAndPushGCR
                      name: GCR DLC cold
                      identifier: gcr_dlc_cold
                      spec:
                        connectorRef: <+pipeline.variables.gcr_connector>
                        host: <+pipeline.variables.gcr_host>
                        projectID: <+pipeline.variables.gcr_project>
                        imageName: <+pipeline.variables.gcr_host>/<+pipeline.variables.gcr_project>/dlc-automation/buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        context: .
                        caching: true
                  - step:
                      type: BuildAndPushGCR
                      name: GCR DLC warm
                      identifier: gcr_dlc_warm
                      spec:
                        connectorRef: <+pipeline.variables.gcr_connector>
                        host: <+pipeline.variables.gcr_host>
                        projectID: <+pipeline.variables.gcr_project>
                        imageName: <+pipeline.variables.gcr_host>/<+pipeline.variables.gcr_project>/dlc-automation/buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        context: .
                        caching: true

        # --- GAR DLC (garBuildPush/dlc-success.yml) ---
        - stage:
            name: 13-gar-dlc
            identifier: gar_dlc
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create DLC Dockerfile
                      identifier: create_dlc_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > Dockerfile <<'EOF'
                          FROM alpine:3.20 AS base
                          RUN apk add --no-cache curl
                          FROM base AS mid
                          RUN echo "gar-mid" > /mid.txt
                          FROM alpine:3.20 AS final
                          COPY --from=mid /mid.txt /mid.txt
                          EOF
                  - step:
                      type: BuildAndPushGAR
                      name: GAR DLC cold
                      identifier: gar_dlc_cold
                      spec:
                        connectorRef: <+pipeline.variables.gar_connector>
                        host: <+pipeline.variables.gar_host>
                        projectID: <+pipeline.variables.gar_project>
                        imageName: <+pipeline.variables.gar_host>/<+pipeline.variables.gar_project>/ci-automation/buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        context: .
                        caching: true
                  - step:
                      type: BuildAndPushGAR
                      name: GAR DLC warm
                      identifier: gar_dlc_warm
                      spec:
                        connectorRef: <+pipeline.variables.gar_connector>
                        host: <+pipeline.variables.gar_host>
                        projectID: <+pipeline.variables.gar_project>
                        imageName: <+pipeline.variables.gar_host>/<+pipeline.variables.gar_project>/ci-automation/buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        context: .
                        caching: true

    # -------------------------------------------------------------------------
    # Base image connector + buildx (Automation Stage A — *buildx*.yml)
    # -------------------------------------------------------------------------
    - parallel:
        - stage:
            name: 20-ecr-base-connector
            identifier: ecr_base_connector
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create Dockerfile needing base pull
                      identifier: create_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > harnessDockerfile <<'EOF'
                          FROM alpine:3.20
                          RUN echo "hello base-connector"
                          EOF
                  - step:
                      type: BuildAndPushECR
                      name: ECR with baseImageConnectorRefs
                      identifier: ecr_base_conn_push
                      spec:
                        connectorRef: <+pipeline.variables.ecr_connector>
                        region: <+pipeline.variables.ecr_region>
                        account: <+pipeline.variables.ecr_account>
                        imageName: buildx-baseconn-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: harnessDockerfile
                        caching: true
                        baseImageConnectorRefs:
                          - <+pipeline.variables.base_image_connector>
                      # Expect: docker buildx build | exporting cache to Harness

        - stage:
            name: 21-gcr-base-connector
            identifier: gcr_base_connector
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create Dockerfile
                      identifier: create_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > harnessDockerfile <<'EOF'
                          FROM alpine:3.20
                          RUN echo "hello gcr base-connector"
                          EOF
                  - step:
                      type: BuildAndPushGCR
                      name: GCR with baseImageConnectorRefs
                      identifier: gcr_base_conn_push
                      spec:
                        connectorRef: <+pipeline.variables.gcr_connector>
                        host: <+pipeline.variables.gcr_host>
                        projectID: <+pipeline.variables.gcr_project>
                        imageName: <+pipeline.variables.gcr_host>/<+pipeline.variables.gcr_project>/ci-play/buildx-baseconn-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: harnessDockerfile
                        caching: true
                        baseImageConnectorRefs:
                          - <+pipeline.variables.base_image_connector>

    # -------------------------------------------------------------------------
    # No-cache baseline + multi-arch smoke (Automation gap fillers)
    # -------------------------------------------------------------------------
    - parallel:
        - stage:
            name: 30-basic-no-cache
            identifier: basic_no_cache
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create Dockerfile
                      identifier: create_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          echo "FROM alpine:3.20" > Dockerfile
                          echo 'RUN echo ok' >> Dockerfile
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: Build push no DLC
                      identifier: docker_no_cache
                      spec:
                        connectorRef: <+pipeline.variables.docker_connector>
                        repo: <+pipeline.variables.docker_repo>
                        tags:
                          - nocache-<+pipeline.variables.run_id>
                        dockerfile: Dockerfile
                        caching: false

        - stage:
            name: 31-multiarch-plugin
            identifier: multiarch_plugin
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create Dockerfile
                      identifier: create_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          cat > Dockerfile <<'EOF'
                          FROM alpine:3.20
                          RUN uname -m > /arch.txt
                          EOF
                  - step:
                      type: Plugin
                      name: Multi-arch build with test image
                      identifier: multiarch_build
                      spec:
                        connectorRef: <+pipeline.variables.docker_connector>
                        image: <+pipeline.variables.buildx_plugin_image>
                        settings:
                          username: <+input>
                          password: <+input>
                          repo: <+pipeline.variables.docker_repo>
                          tags: multiarch-<+pipeline.variables.run_id>
                          dockerfile: Dockerfile
                          platform: linux/amd64,linux/arm64
                          # Provenance off for simpler registry acceptance during validation
                          buildx_options: "--provenance=false"

        - stage:
            name: 32-acr-basic
            identifier: acr_basic
            type: CI
            spec:
              cloneCodebase: false
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: Create Dockerfile
                      identifier: create_dockerfile
                      spec:
                        shell: Sh
                        command: |
                          echo "FROM alpine:3.20" > Dockerfile
                  - step:
                      type: BuildAndPushACR
                      name: ACR push (no DLC in Automation)
                      identifier: acr_push
                      spec:
                        connectorRef: <+pipeline.variables.acr_connector>
                        repository: buildx-val-<+pipeline.variables.run_id>
                        tags:
                          - "1.0"
                        dockerfile: Dockerfile
                        caching: false
                      when:
                        stageStatus: Success
                        # Skip if ACR connector not provided — set condition in UI if needed

    # -------------------------------------------------------------------------
    # Optional: K8 DLC backend smoke (Automation Stage D)
    # Enable when you have a K8s connector + project-level DLC store configured.
    # -------------------------------------------------------------------------
    - stage:
        name: 40-k8-dlc-optional
        identifier: k8_dlc_optional
        type: CI
        when:
          pipelineStatus: Success
          condition: "false"
        # Flip condition to true (or remove when:) once K8 + DLC project settings exist.
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: <+input>
              namespace: harness-delegate
          execution:
            steps:
              - step:
                  type: Run
                  name: Create DLC Dockerfile
                  identifier: create_dlc_dockerfile
                  spec:
                    connectorRef: <+pipeline.variables.docker_connector>
                    image: alpine:3.20
                    shell: Sh
                    command: |
                      cat > Dockerfile <<'EOF'
                      FROM alpine:3.20 AS base
                      RUN apk add --no-cache curl
                      FROM alpine:3.20 AS final
                      COPY --from=base /etc/os-release /os-release
                      EOF
              - step:
                  type: BuildAndPushDockerRegistry
                  name: K8 DLC cold
                  identifier: k8_dlc_cold
                  spec:
                    connectorRef: <+pipeline.variables.docker_connector>
                    repo: <+pipeline.variables.docker_repo>
                    tags:
                      - k8-dlc-<+pipeline.variables.run_id>
                    dockerfile: Dockerfile
                    caching: true
              - step:
                  type: BuildAndPushDockerRegistry
                  name: K8 DLC warm
                  identifier: k8_dlc_warm
                  spec:
                    connectorRef: <+pipeline.variables.docker_connector>
                    repo: <+pipeline.variables.docker_repo>
                    tags:
                      - k8-dlc-<+pipeline.variables.run_id>
                    dockerfile: Dockerfile
                    caching: true
